<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPUB</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--background-primary, #1e1e1e);
      color: var(--text-normal, #dcddde);
      font-family: system-ui, sans-serif;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid rgba(128, 128, 128, 0.35);
      flex-shrink: 0;
      z-index: 2;
      position: relative;
    }
    #toolbar button {
      background: transparent;
      border: 1px solid rgba(128, 128, 128, 0.4);
      border-radius: 4px;
      color: inherit;
      cursor: pointer;
      padding: 0.2rem 0.55rem;
      font-size: 0.9rem;
    }
    #toolbar button:hover {
      background: rgba(128, 128, 128, 0.15);
    }
    #progress {
      flex: 1;
      min-width: 4rem;
    }
    #status {
      font-size: 0.75rem;
      opacity: 0.75;
      min-width: 3rem;
      text-align: right;
    }
    #host {
      height: calc(100% - 42px);
      width: 100%;
      position: relative;
    }
    foliate-view {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button type="button" id="btn-prev" title="Previous">←</button>
    <input id="progress" type="range" min="0" max="1" step="any" value="0" />
    <button type="button" id="btn-next" title="Next">→</button>
    <span id="status"></span>
  </div>
  <div id="host"></div>
  <script type="module" src="./epub-bridge.js"></script>
</body>
</html>
