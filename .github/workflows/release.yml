name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          # Pas de cache yarn intégré : corruptions possibles (ex. y18n ENOENT sur le runner).

      - name: Install dependencies
        run: |
          set -euo pipefail
          # @codemirror/language (git) a un script "prepare" qui relance yarn sans lockfile
          # et peut faire échouer la CI (cache corrompu). Le dépôt git inclut déjà dist/.
          yarn install --frozen-lockfile --ignore-scripts

      - name: Build plugin
        run: |
          set -euo pipefail
          yarn build
          test -f main.js
          test -f manifest.json
          test -f styles.css
          test -f pdf.worker.min.mjs
          test -d pdfjs

      - name: Package plugin zip
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          zip -r "pandocit-${tag}.zip" \
            main.js \
            manifest.json \
            styles.css \
            pdf.worker.min.mjs \
            pdfjs

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --notes-file="release-notes.md" \
            main.js \
            manifest.json \
            styles.css \
            pdf.worker.min.mjs \
            "pandocit-${tag}.zip"
