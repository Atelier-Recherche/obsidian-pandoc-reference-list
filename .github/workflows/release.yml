name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          # >= 20 requis (transitif pdfjs / selenium-webdriver). 22 = LTS stable.
          node-version: '22.x'
          cache: 'yarn'

      - name: Build plugin
        run: |
          set -euo pipefail
          yarn install --frozen-lockfile
          yarn build
          test -f main.js
          test -f manifest.json
          test -f styles.css
          test -f pdf.worker.min.mjs
          test -d pdfjs

      - name: Package plugin zip
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          zip -r "pandocit-${tag}.zip" \
            main.js \
            manifest.json \
            styles.css \
            pdf.worker.min.mjs \
            pdfjs

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --notes-file="release-notes.md" \
            main.js \
            manifest.json \
            styles.css \
            pdf.worker.min.mjs \
            "pandocit-${tag}.zip"
