name: Release Obsidian plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      YARN_CACHE_FOLDER: ${{ github.workspace }}/.ci-yarn-cache

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          set -euo pipefail
          rm -rf .ci-yarn-cache node_modules
          install_ok=0
          for attempt in 1 2 3; do
            echo "=== yarn install (tentative ${attempt}/3) ==="
            if yarn install --frozen-lockfile --ignore-scripts --network-timeout 300000; then
              install_ok=1
              break
            fi
            echo "Échec install — purge cache CI et nouvelle tentative…"
            rm -rf .ci-yarn-cache node_modules
            sleep 15
          done
          if [ "$install_ok" -ne 1 ]; then
            echo "yarn install a échoué après 3 tentatives"
            exit 1
          fi

      - name: Build plugin
        run: |
          set -euo pipefail
          yarn build
          test -f main.js
          test -f manifest.json
          test -f styles.css

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"

          # Catalogue Obsidian : uniquement ces 3 fichiers (pas de zip ni pdf.worker.min.mjs).
          # Le worker PDF est inclus dans main.js (gzip+base64, décompressé au runtime).
          gh release create "$tag" \
            --title="$tag" \
            --notes-file="release-notes.md" \
            main.js \
            manifest.json \
            styles.css
